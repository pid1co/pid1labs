---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: local-path-storage
resources:
  - https://github.com/rancher/local-path-provisioner/deploy?ref=v0.0.35
patches:
  - target:
      kind: ConfigMap
      name: local-path-config
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: local-path-config
      data:
        config.json: |-
          {
            "nodePathMap": [
              {
                "node": "DEFAULT_PATH_FOR_NON_LISTED_NODES",
                "paths": ["/var/mnt/u-nvme-fast"]
              }
            ]
          }
  - target:
      kind: Namespace
      name: local-path-storage
    patch: |-
      apiVersion: v1
      kind: Namespace
      metadata:
        name: local-path-storage
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged
  - target:
      kind: StorageClass
      name: local-path
    patch: |-
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        name: local-path
        annotations:
          storageclass.kubernetes.io/is-default-class: "true"
