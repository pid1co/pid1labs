apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-crds
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: pid1labs
    namespace: flux-system
  path: "./bootstrap/external-secrets/crds"
  prune: false
  force: true  # this enables server-side apply
