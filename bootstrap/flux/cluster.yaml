---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-repositories
  namespace: flux-system
spec:
  interval: 10m
  path: ./bootstrap/flux/repositories
  prune: true
  sourceRef:
    kind: GitRepository
    name: pid1labs
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-crds
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: "./bootstrap/external-secrets/crds"
  prune: false
  force: true
---
# Deploy external-secrets operator first
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-secrets
  namespace: flux-system
spec:
  interval: 10m
  path: ./bootstrap/external-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: pid1labs
  wait: true
  dependsOn:
    - name: cluster-repositories
    - name: external-secrets-crds
---
# Deploy ClusterSecretStore after external-secrets operator is ready
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-stores
  namespace: flux-system
spec:
  interval: 10m
  path: ./bootstrap/secret-stores
  prune: true
  sourceRef:
    kind: GitRepository
    name: pid1labs
  wait: false  # ClusterSecretStore health not evaluated by Flux by default
  dependsOn:
    - name: cluster-secrets
