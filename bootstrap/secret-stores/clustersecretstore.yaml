---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: onepassword
spec:
  provider:
    onepassword:
      connectHost: http://onepassword-connect.external-secrets.svc:8080
      vaults:
        homelab-k8s: 1
      auth:
        secretRef:
          connectTokenSecretRef:
            name: onepassword-connect-credentials
            namespace: external-secrets
            key: token
---
# Note: The onepassword-connect-credentials secret must be created manually:
#
# kubectl create secret generic onepassword-connect-credentials \
#   --namespace external-secrets \
#   --from-file=1password-credentials.json
#
# To get credentials:
# 1. Go to 1Password.com -> Settings -> Integrations -> Connect
# 2. Create a new Connect server
# 3. Download the 1password-credentials.json file
# 4. Create the secret with the command above
