---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: onepassword-connect
  namespace: external-secrets
spec:
  interval: 30m
  chart:
    spec:
      chart: connect
      version: "2.4.1"
      sourceRef:
        kind: HelmRepository
        name: onepassword
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    connect:
      # Use existing secret
      credentialsName: onepassword-connect-credentials
      credentialsKey: 1password-credentials.json
      serviceType: ClusterIP
      api:
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 1Gi
      sync:
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 1Gi
